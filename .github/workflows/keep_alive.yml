name: Keep Render Backend Awake

on:
  schedule:
    # This runs every 12 minutes
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl -I https://tatva-logistic-module.onrender.com/cargo/estimate || echo "Server is waking up..."